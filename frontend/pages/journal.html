<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student360 | Journal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-a: #56ab2f;
            --bg-b: #a8e063;
            --sidebar-color-1: #2f8f46;
            --sidebar-color-2: #89d36c;
            --text-main-color: #124b2e;
            --text-muted-color: #4b7a63;
            --surface: #ffffff;
            --surface-strong: #ffffff;
            --text-main: #124b2e;
            --text-muted: #4b7a63;
            --danger: #ff6b6b;
            --success: #32d583;
            --warning: #fbbf24;
            --card-shadow: rgba(32, 86, 56, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            color: var(--text-main-color);
            background: #ffffff;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: linear-gradient(160deg, var(--sidebar-color-1), var(--sidebar-color-2));
            border-right: 1px solid rgba(17, 84, 41, 0.25);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            color: #f8fff9;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .brand img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.7);
        }

        .brand h1 {
            font-size: 18px;
            line-height: 1.2;
        }

        .student-card {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 14px;
            padding: 14px;
        }

        .student-card p {
            font-size: 12px;
            color: rgba(245, 255, 247, 0.9);
        }

        .student-card h2 {
            margin-top: 4px;
            font-size: 18px;
            font-weight: 600;
        }

        .menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu a {
            text-decoration: none;
            color: #f8fff9;
            display: block;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.14);
            transition: 0.25s ease;
        }

        .menu a:hover,
        .menu a.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.55);
            transform: translateX(4px);
        }

        .main {
            background: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: var(--surface);
            border: 1px solid #cdebd8;
            border-radius: 16px;
            padding: 14px 16px;
            box-shadow: 0 10px 24px var(--card-shadow);
        }

        .welcome h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main-color);
        }

        .welcome p {
            font-size: 13px;
            color: var(--text-muted-color);
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid var(--sidebar-color-1);
            background: rgba(47, 143, 70, 0.1);
            display: grid;
            place-items: center;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--sidebar-color-1);
            background: linear-gradient(135deg, rgba(47, 143, 70, 0.15), rgba(137, 211, 108, 0.15));
            color: var(--text-main-color);
            font-weight: 700;
            display: grid;
            place-items: center;
        }

        .panel {
            background: var(--surface-strong);
            border: 1px solid #d7efdf;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 24px var(--card-shadow);
        }

        .panel h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: var(--text-main-color);
        }

        .entry-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main-color);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-muted-color);
            font-style: italic;
        }

        .form-input,
        .form-textarea {
            padding: 12px 14px;
            border: 1px solid #d9efe0;
            border-radius: 10px;
            font-size: 14px;
            font-family: "Poppins", sans-serif;
            color: var(--text-main-color);
            transition: border 0.2s, box-shadow 0.2s;
            background: #f6fcf8;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--sidebar-color-1);
            box-shadow: 0 0 0 3px rgba(47, 143, 70, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
            font-size: 13px;
            line-height: 1.6;
        }

        .btn-save {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--sidebar-color-1), var(--sidebar-color-2));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            align-self: flex-start;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(47, 143, 70, 0.3);
        }

        .btn-save:active {
            transform: translateY(0);
        }

        .success-message {
            padding: 12px 16px;
            background: #d1fae5;
            border: 1px solid #6ee7b7;
            border-radius: 10px;
            color: #065f46;
            font-size: 13px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .entry-count {
            font-size: 13px;
            color: var(--text-muted-color);
            background: #f6fcf8;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .entries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .entry-card {
            background: linear-gradient(135deg, #f6fcf8, #ffffff);
            border: 1px solid #d9efe0;
            border-left: 4px solid var(--sidebar-color-1);
            border-radius: 12px;
            padding: 12px;
            animation: fadeIn 0.3s ease;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .entry-card:hover {
            box-shadow: 0 4px 12px rgba(47, 143, 70, 0.15);
        }

        .entry-card.expanded {
            grid-column: span 1;
            padding: 16px;
            min-height: auto;
            display: flex;
            flex-direction: column;
        }

        .entry-title-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
        }

        .entry-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main-color);
            word-break: break-word;
        }

        .entry-date-small {
            font-size: 10px;
            color: var(--text-muted-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .entry-date {
            font-size: 11px;
            color: var(--text-muted-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .entry-preview {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .entry-item {
            display: block;
        }

        .entry-item.show {
            display: block;
        }

        .entry-question {
            font-size: 13px;
            font-weight: 700;
            color: var(--sidebar-color-1);
            margin-bottom: 6px;
        }

        .entry-text {
            font-size: 13px;
            color: var(--text-main-color);
            line-height: 1.6;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            padding: 8px 10px;
            background: rgba(47, 143, 70, 0.05);
            border-radius: 6px;
        }

        .entry-text.expanded {
            overflow: visible;
            display: block;
            -webkit-line-clamp: unset;
            line-clamp: unset;
            white-space: normal;
            padding: 10px 12px;
        }

        .entry-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .btn-expand,
        .btn-edit,
        .btn-delete {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            flex: 1;
        }

        .btn-expand {
            background: #dbeafe;
            color: #1e40af;
        }

        .btn-edit {
            background: #fce7f3;
            color: #be185d;
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-expand:hover,
        .btn-edit:hover,
        .btn-delete:hover {
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted-color);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-text {
            font-size: 14px;
        }

        /* Chatbot Styles */
        .chat-panel {
            display: flex;
            flex-direction: column;
            height: auto;
            min-height: 750px;
            padding: 24px;
            overflow: visible;
        }

        .chat-panel h2 {
            padding: 0;
            padding-bottom: 20px;
            margin-bottom: 0;
        }

        .chat-panel iframe {
            flex: 1;
            border-radius: 12px;
            border: 1px solid #d7efdf;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px 24px 24px;
            gap: 12px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 8px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #d0d0d0;
            border-radius: 10px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #b0b0b0;
        }

        .chat-message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        .chat-message.bot-message {
            align-items: flex-start;
        }

        .chat-message.user-message {
            flex-direction: row-reverse;
            align-items: flex-start;
        }

        .message-avatar {
            font-size: 24px;
            min-width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }

        .bot-message .message-content {
            background: #f0f7f3;
            color: var(--text-main-color);
            border: 1px solid #d7efdf;
            border-left: 4px solid var(--sidebar-color-1);
        }

        .user-message .message-content {
            background: linear-gradient(135deg, var(--sidebar-color-1), var(--sidebar-color-2));
            color: white;
        }

        .message-content p {
            margin: 0;
            font-size: 13px;
            word-wrap: break-word;
        }

        .chat-input-container {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid #d7efdf;
        }

        .chat-input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #d9efe0;
            border-radius: 10px;
            font-size: 14px;
            font-family: "Poppins", sans-serif;
            color: var(--text-main-color);
            background: #f6fcf8;
            transition: border 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--sidebar-color-1);
            box-shadow: 0 0 0 3px rgba(47, 143, 70, 0.1);
        }

        .chat-send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--sidebar-color-1), var(--sidebar-color-2));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .chat-send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(47, 143, 70, 0.3);
        }

        .chat-send-btn:active {
            transform: translateY(0);
        }

        .chat-send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @media (max-width: 1200px) {
            .entries-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            }
        }

        @media (max-width: 820px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: grid;
                grid-template-columns: auto 1fr auto;
                gap: 14px;
                padding: 14px;
                margin-bottom: 14px;
                border-right: none;
                border-bottom: 1px solid rgba(17, 84, 41, 0.25);
            }

            .student-card {
                display: none;
            }

            .menu {
                display: flex;
                flex-direction: row;
                gap: 6px;
                grid-column: 1 / -1;
            }

            .menu a {
                font-size: 12px;
                padding: 8px 10px;
            }

            .main {
                padding: 14px;
            }

            .panel {
                padding: 16px;
            }

            .panel h2 {
                font-size: 18px;
                margin-bottom: 16px;
            }

            .entries-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .topbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 680px) {
            .sidebar {
                grid-template-columns: 1fr;
            }

            .brand {
                order: 2;
            }

            .menu {
                order: 3;
                grid-column: 1;
            }

            .entries-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .form-textarea {
                min-height: 80px;
            }

            .entries-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .btn-expand,
            .btn-delete {
                padding: 4px 8px;
                font-size: 10px;
            }
        }

        /* Chatbase Widget Styling */
        #chatbase-iframe,
        iframe[src*="chatbase"] {
            border: 1px solid #d7efdf !important;
            border-radius: 16px !important;
            box-shadow: 0 10px 24px rgba(32, 86, 56, 0.12) !important;
        }

        .chatbase-container {
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">
                <img src="../assets/images/logo.png" alt="Student360 Logo">
                <h1>Student 360</h1>
            </div>

            <div class="student-card">
                <p>Student</p>
                <h2 id="studentName">Reya Student</h2>
                <p id="collegeLabel">College: BRECW</p>
            </div>

            <ul class="menu">
                <li><a href="student.html">Dashboard</a></li>
                <li><a href="attendance.html">Attendance</a></li>
                <li><a href="mood.html">Mood Tracker</a></li>
                <li><a class="active" href="journal.html">AI Support</a></li>
                <li><a href="exercises.html">Exercises</a></li>
                <li><a href="studentdetails.html">Student Details</a></li>
                <li><a href="#" onclick="logout(event)">Sign Out</a></li>
            </ul>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="welcome">
                    <h3 id="welcomeText">Welcome back, Reya</h3>
                    <p>Reflect on your day and capture your thoughts</p>
                </div>
                <div class="top-actions">
                    <div class="icon-btn" aria-label="Notifications">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M15 17H9M18 17V11C18 7.68629 15.3137 5 12 5C8.68629 5 6 7.68629 6 11V17L4 19V20H20V19L18 17Z" stroke="#1f7a42" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <div class="avatar" id="avatarLetter">R</div>
                </div>
            </header>

            <section class="panel chat-panel">
                <h2>SARTHI - AI Support</h2>
                <iframe
                    src="https://www.chatbase.co/chatbot-iframe/lpjwddBIh1A40GzeR7Hc9"
                    width="100%"
                    height="700"
                    frameborder="0"
                    allow="clipboard-write"
                ></iframe>
            </section>
        </main>
    </div>

    <script>
        const collegeLogoMap = {
            "BRECW": "../assets/images/brecw.jpeg",
            "Anurag University": "../assets/images/anurag.png",
            "BVRIT": "../assets/images/bvrit.png",
            "MREM": "../assets/images/mrem.jpeg",
            "JNTUH": "../assets/images/jntuh.jpeg",
            "CBIT": "../assets/images/cbit.jpeg",
            "VNRVJIET": "../assets/images/vnrvjiet.png"
        };

        const collegeThemes = {
            "BRECW": ["#56ab2f", "#a8e063"],
            "Anurag University": ["#faa84a", "#fcc470"],
            "BVRIT": ["#cb2d3e", "#ef473a"],
            "MREM": ["#A0522D", "#D2691E"],
            "JNTUH": ["#4f46e5", "#ec4899"],
            "CBIT": ["#11998e", "#38ef7d"],
            "VNRVJIET": ["#b91c1c", "#ef4444"]
        };

        // Helper functions for user-namespaced localStorage
        function getStorageKey(key) {
            const currentUser = localStorage.getItem('student360CurrentUser');
            return currentUser ? `${currentUser}_${key}` : key;
        }

        function getFromStorage(key) {
            return localStorage.getItem(getStorageKey(key));
        }

        function setToStorage(key, value) {
            localStorage.setItem(getStorageKey(key), value);
        }

        function logout(event) {
            event.preventDefault();
            // Clear all student360 related data from localStorage
            localStorage.clear();
            // Redirect to login page
            window.location.href = "../index.html";
        }

        const params = new URLSearchParams(window.location.search);
        const selectedCollege = params.get("college") || getFromStorage("student360College") || "BRECW";
        const studentName = getFromStorage("student360Name") || "Reya Student";

        const collegeSidebarThemes = {
            "BRECW": ["#2f8f46", "#89d36c", "#0d4620"],
            "Anurag University": ["#d97706", "#f59e0b", "#92400e"],
            "BVRIT": ["#991b1b", "#dc2626", "#7f1d1d"],
            "MREM": ["#8B4513", "#D2691E", "#4A2511"],
            "JNTUH": ["#5b21b6", "#a855f7", "#3f0f5c"],
            "CBIT": ["#0d9488", "#14b8a6", "#134e4a"],
            "VNRVJIET": ["#7f1d1d", "#b91c1c", "#5f1718"]
        };

        const [bgA, bgB] = collegeThemes[selectedCollege] || collegeThemes["BRECW"];
        const [sidebarA, sidebarB, textColor] = collegeSidebarThemes[selectedCollege] || collegeSidebarThemes["BRECW"];
        
        document.documentElement.style.setProperty("--bg-a", bgA);
        document.documentElement.style.setProperty("--bg-b", bgB);
        document.documentElement.style.setProperty("--sidebar-color-1", sidebarA);
        document.documentElement.style.setProperty("--sidebar-color-2", sidebarB);
        document.documentElement.style.setProperty("--text-main-color", textColor);
        document.documentElement.style.setProperty("--text-muted-color", textColor + "cc");

        // Update notification icon stroke color
        const notificationPath = document.querySelector(".icon-btn svg path");
        if (notificationPath) {
            notificationPath.setAttribute("stroke", sidebarA);
        }

        const firstName = studentName.split(" ")[0];
        const firstLetter = firstName.charAt(0).toUpperCase();
        const collegeLogo = collegeLogoMap[selectedCollege] || "../assets/images/logo.png";

        setToStorage("student360College", selectedCollege);

        document.getElementById("collegeLabel").textContent = `College: ${selectedCollege}`;
        document.getElementById("studentName").textContent = studentName;
        document.getElementById("welcomeText").textContent = `Welcome back, ${firstName}`;
        document.getElementById("avatarLetter").textContent = firstLetter;
        document.querySelector(".brand img").src = collegeLogo;

        // Initial display
        document.body.style.fontFamily = '"Poppins", sans-serif';
    </script>
