<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student360 | Teacher Details</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-color-1: #2f8f46;
            --sidebar-color-2: #89d36c;
            --text-main-color: #124b2e;
            --text-muted-color: #4b7a63;
            --line: #d7efdf;
            --chip-border: #96d6ae;
            --chip-bg: #effaf2;
            --chip-text: #14532d;
            --panel: #ffffff;
            --shadow: rgba(15, 23, 42, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            min-height: 100vh;
            background: #ffffff;
            color: var(--text-main-color);
        }

        .layout {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar {
            background: linear-gradient(160deg, var(--sidebar-color-1), var(--sidebar-color-2));
            border-right: 1px solid rgba(17, 84, 41, 0.25);
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            color: #f8fff9;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
        }

        .brand img {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.7);
            background: #fff;
        }

        .brand h1 {
            font-size: 18px;
            line-height: 1.2;
        }

        .teacher-card {
            background: rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 14px;
            padding: 14px;
        }

        .teacher-card p {
            font-size: 12px;
            color: rgba(245, 255, 247, 0.9);
        }

        .teacher-card h2 {
            margin-top: 4px;
            font-size: 18px;
            font-weight: 600;
        }

        .menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu a {
            text-decoration: none;
            color: #f8fff9;
            display: block;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.14);
            transition: 0.25s ease;
        }

        .menu a:hover,
        .menu a.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.55);
            transform: translateX(4px);
        }

        .main {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .topbar,
        .details-panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 16px;
            box-shadow: 0 10px 24px var(--shadow);
        }

        .topbar {
            padding: 14px 16px;
        }

        .topbar h3 {
            font-size: 20px;
        }

        .topbar p {
            margin-top: 4px;
            font-size: 13px;
            color: var(--text-muted-color);
        }

        .details-panel {
            padding: 14px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(180px, 1fr));
            gap: 10px;
        }

        .field {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            background: #fff;
        }

        .field p {
            font-size: 11px;
            color: var(--text-muted-color);
        }

        .field h4 {
            margin-top: 4px;
            font-size: 14px;
            color: var(--text-main-color);
            line-height: 1.3;
            word-break: break-word;
        }

        @media (max-width: 1020px) {
            .details-grid {
                grid-template-columns: repeat(2, minmax(160px, 1fr));
            }
        }

        @media (max-width: 920px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 620px) {
            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="brand">
                <img id="collegeLogo" src="../assets/images/logo.png" alt="College logo">
                <h1>Student360<br>Teacher</h1>
            </div>

            <div class="teacher-card">
                <p>Teacher Panel</p>
                <h2 id="teacherName">Ms. Teacher</h2>
                <p id="collegeLabel">College: BRECW</p>
            </div>

            <ul class="menu">
                <li><a id="dashboardLink" href="teacher.html">Dashboard</a></li>
                <li><a id="studentsLink" href="teacher-students.html">Student Details</a></li>
                <li><a id="assignmentsLink" href="teacher-assignments.html">Assignments</a></li>
                <li><a id="teacherParentLink" href="teacherparent.html">Teacher Parent</a></li>
                <li><a class="active" id="teacherDetailsLink" href="teacherdetails.html">Teacher Details</a></li>
                <li><a href="#" onclick="logout(event)">Sign Out</a></li>
            </ul>
        </aside>

        <main class="main">
            <section class="topbar">
                <h3>Teacher Details</h3>
                <p>Your profile and subject details used for assignment publishing.</p>
            </section>

            <section class="details-panel">
                <div class="details-grid" id="detailsGrid"></div>
            </section>
        </main>
    </div>

    <script>
        const collegeLogoMap = {
            "BRECW": "../assets/images/brecw.jpeg",
            "Anurag University": "../assets/images/anurag.png",
            "BVRIT": "../assets/images/bvrit.png",
            "MREM": "../assets/images/mrem.jpeg",
            "JNTUH": "../assets/images/jntuh.jpeg",
            "CBIT": "../assets/images/cbit.jpeg",
            "VNRVJIET": "../assets/images/vnrvjiet.png"
        };

        const collegeThemeMap = {
            "BRECW": ["#2f8f46", "#89d36c", "#124b2e", "#4b7a63", "#d7efdf", "#96d6ae", "#effaf2", "#14532d"],
            "Anurag University": ["#d97706", "#f59e0b", "#92400e", "#a16207", "#f6d9a6", "#f0b45a", "#fff7e8", "#92400e"],
            "BVRIT": ["#991b1b", "#dc2626", "#7f1d1d", "#991b1b", "#f4c7c7", "#e88f8f", "#fff2f2", "#7f1d1d"],
            "MREM": ["#8B4513", "#D2691E", "#5a2f0d", "#7c4a22", "#ecd3bf", "#d89c6d", "#fff6ef", "#6f3d14"],
            "JNTUH": ["#5b21b6", "#a855f7", "#3f0f5c", "#5b2286", "#e6d4fb", "#c59df4", "#f7f1ff", "#4c1d95"],
            "CBIT": ["#0d9488", "#14b8a6", "#134e4a", "#0f766e", "#c7ece8", "#86d9d1", "#eefcf9", "#115e59"],
            "VNRVJIET": ["#7f1d1d", "#b91c1c", "#5f1718", "#7b2121", "#f2c6c6", "#dc9d9d", "#fff3f3", "#7f1d1d"]
        };

        function getStorageKey(key) {
            const currentUser = localStorage.getItem("student360CurrentUser");
            return currentUser ? `${currentUser}_${key}` : key;
        }

        function logout(event) {
            event.preventDefault();
            localStorage.clear();
            window.location.href = "../index.html";
        }

        function getFromStorage(key) {
            return localStorage.getItem(getStorageKey(key));
        }

        function deriveTeacherSubject(seedText) {
            const subjects = ["Mathematics", "Physics", "Chemistry", "English", "Computer Science", "Electronics", "Data Structures"];
            const text = (seedText || "teacher").toString();
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
            }
            return subjects[hash % subjects.length];
        }

        function deriveTeacherMeta(seedText) {
            const departments = ["Science", "Humanities", "Engineering", "Computing", "Electronics"];
            const experiences = ["2 years", "4 years", "6 years", "8 years", "10 years"];
            const seed = (seedText || "teacher").toString();
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = (hash * 31 + seed.charCodeAt(i)) >>> 0;
            }
            return {
                department: departments[hash % departments.length],
                experience: experiences[hash % experiences.length],
                employeeId: `TCH-${String((hash % 9000) + 1000)}`,
                phone: `9${String(100000000 + (hash % 900000000)).padStart(9, "0")}`
            };
        }

        function applyCollegeTheme(college) {
            const [sidebarA, sidebarB, textMain, textMuted, lineColor, chipBorder, chipBg, chipText] =
                collegeThemeMap[college] || collegeThemeMap["BRECW"];

            document.documentElement.style.setProperty("--sidebar-color-1", sidebarA);
            document.documentElement.style.setProperty("--sidebar-color-2", sidebarB);
            document.documentElement.style.setProperty("--text-main-color", textMain);
            document.documentElement.style.setProperty("--text-muted-color", textMuted);
            document.documentElement.style.setProperty("--line", lineColor);
            document.documentElement.style.setProperty("--chip-border", chipBorder);
            document.documentElement.style.setProperty("--chip-bg", chipBg);
            document.documentElement.style.setProperty("--chip-text", chipText);
        }

        function createField(label, value) {
            return `<div class="field"><p>${label}</p><h4>${value}</h4></div>`;
        }

        const params = new URLSearchParams(window.location.search);
        const selectedCollege = params.get("college") || getFromStorage("student360College") || "BRECW";
        const teacherName = getFromStorage("student360Name") || "Ms. Teacher";
        const teacherEmail = getFromStorage("student360Email") || "teacher@student360.edu";
        const teacherSubject = getFromStorage("student360TeacherSubject") || deriveTeacherSubject(teacherEmail);
        const collegeLogo = collegeLogoMap[selectedCollege] || "../assets/images/logo.png";
        const meta = deriveTeacherMeta(teacherEmail);

        document.getElementById("teacherName").textContent = teacherName;
        document.getElementById("collegeLabel").textContent = `College: ${selectedCollege}`;
        document.getElementById("collegeLogo").src = collegeLogo;
        document.getElementById("dashboardLink").href = `teacher.html?college=${encodeURIComponent(selectedCollege)}`;
        document.getElementById("studentsLink").href = `teacher-students.html?college=${encodeURIComponent(selectedCollege)}`;
        document.getElementById("assignmentsLink").href = `teacher-assignments.html?college=${encodeURIComponent(selectedCollege)}`;
        document.getElementById("teacherParentLink").href = `teacherparent.html?college=${encodeURIComponent(selectedCollege)}`;
        document.getElementById("teacherDetailsLink").href = `teacherdetails.html?college=${encodeURIComponent(selectedCollege)}`;

        applyCollegeTheme(selectedCollege);

        document.getElementById("detailsGrid").innerHTML = [
            createField("Teacher Name", teacherName),
            createField("Email", teacherEmail),
            createField("Primary Subject", teacherSubject),
            createField("Employee ID", meta.employeeId),
            createField("Department", meta.department),
            createField("Experience", meta.experience),
            createField("Phone", meta.phone),
            createField("College", selectedCollege),
            createField("Classes Handling", "CSE-A, CSE-B, CSE-C, ECE-A, IT-A, IT-B")
        ].join("");
    </script>
</body>
</html>
